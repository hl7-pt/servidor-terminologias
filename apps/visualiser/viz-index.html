<html>
  <head>
    <meta http-equiv="Content-type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Visualizador de Recursos FHIR</title>
    <script src="https://code.jquery.com/jquery-3.6.1.min.js" integrity="sha256-o88AwQnZB+VDvE9tvIXrMQaPlFFSUTR+nldQm1LuPXQ=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/liquidjs/dist/liquid.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css" integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="../assets/css/common.css">
    <style>
      /* Visualizer specific styles */
      body {
        background-color: #f5f7fa;
        min-height: 100vh;
      }

      #result {
        padding: 0;
        margin: 0;
      }

      /* Loading indicator */
      .viz-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        color: #666;
      }

      .viz-loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e0e0e0;
        border-top-color: #0c364a;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      .viz-error {
        max-width: 600px;
        margin: 40px auto;
        padding: 30px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      .viz-error h3 {
        color: #c62828;
        margin-bottom: 15px;
      }

      .viz-error p {
        color: #666;
        margin-bottom: 20px;
      }

      .viz-error code {
        display: block;
        background: #f5f5f5;
        padding: 10px;
        border-radius: 6px;
        font-size: 12px;
        word-break: break-all;
        color: #333;
      }

      /* Footer version */
      .viz-footer {
        text-align: center;
        padding: 20px;
        color: #999;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div id="header-container"></div>

    <!-- Result container -->
    <div id="result">
      <div class="viz-loading">
        <div class="viz-loading-spinner"></div>
        <p>A carregar recurso...</p>
      </div>
    </div>

    <div class="viz-footer">
      <p>Visualizador de Recursos FHIR v0.2.0</p>
    </div>

    <script type="text/javascript">
      $(document).ready(function() {
        // Load the header
        $("#header-container").load("../header.html", function() {
          // No specific page to mark as active in visualizer
        });
      });

      url = window.location.search.split('url=')[1];

      if (!url) {
        document.getElementById("result").innerHTML = `
          <div class="viz-error">
            <h3>⚠️ URL não especificado</h3>
            <p>É necessário especificar um URL de recurso FHIR para visualizar.</p>
            <p>Exemplo: <code>?url=https://servidor.fhir.pt/fhir/CodeSystem/exemplo</code></p>
          </div>
        `;
      } else {
        const match = url.match(/fhir\/(.*?)\//);
        const resourceType = match ? match[1] : null;
        
        if (!resourceType) {
          document.getElementById("result").innerHTML = `
            <div class="viz-error">
              <h3>⚠️ Tipo de recurso não identificado</h3>
              <p>Não foi possível identificar o tipo de recurso FHIR no URL.</p>
              <code>${url}</code>
            </div>
          `;
        } else {
          const urlsplit = url.split('/' + resourceType + '/');
          console.log(urlsplit);

          if (urlsplit[1]) {
            const mpdid = urlsplit[1];
            url = urlsplit[0] + '/' + resourceType + '?_id=' + mpdid + '&_format=json';
          }
          
          const templateFile = resourceType + ".liquid";
          const result = document.querySelector('#result');
          const engine = new liquidjs.Liquid();
          
          $.get("./templates/" + templateFile, function(ltemplate) {
            $.getJSON(url, function(json) {
              console.log(url);
              engine
                .parseAndRender(ltemplate, json)
                .then(html => result.innerHTML = html)
                .catch(err => {
                  result.innerHTML = `
                    <div class="viz-error">
                      <h3>⚠️ Erro ao renderizar</h3>
                      <p>Ocorreu um erro ao processar o template.</p>
                      <code>${err.message}</code>
                    </div>
                  `;
                });
            }).fail(function(xhr, status, error) {
              result.innerHTML = `
                <div class="viz-error">
                  <h3>⚠️ Erro ao carregar recurso</h3>
                  <p>Não foi possível obter o recurso FHIR.</p>
                  <code>Status: ${status} - ${error}</code>
                </div>
              `;
            });
          }).fail(function() {
            result.innerHTML = `
              <div class="viz-error">
                <h3>⚠️ Template não encontrado</h3>
                <p>Não existe um template de visualização para o tipo <strong>${resourceType}</strong>.</p>
              </div>
            `;
          });
        }
      }
    </script>
  </body>
</html>
